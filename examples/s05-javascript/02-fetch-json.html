<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>JS — fetch من API</title>
  <style>
    body { background: #0d1117; color: #e6edf3; font-family: sans-serif; padding: 40px; }
    pre { background: #161b22; padding: 16px; border-radius: 8px; margin-top: 16px; direction: ltr; }
  </style>
</head>
<body>

  <h2>ماذا يُرسل الـ API؟</h2>
  <button onclick="loadData()">اجلب البيانات</button>
  <pre id="output">اضغط الزر...</pre>

  <script>
    function loadData() {
      fetch('http://localhost:8080/api/latest')
        .then(response => response.json())   // حوّل الرد إلى JSON
        .then(data => {
          // data الآن هو كائن JavaScript
          document.getElementById('output').textContent =
            JSON.stringify(data, null, 2);   // اعرضه منسقاً
        });
    }
  </script>

  <!--
    الرد سيبدو هكذا:
    {
      "temperature": 28.5,
      "humidity": 65,
      "water_level": 62000,
      "soil_moisture": 18000
    }
  -->

</body>
</html>
