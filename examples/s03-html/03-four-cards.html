<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة رصد — HTML فقط</title>
</head>
<body>

  <h1>لوحة تحكم رصد 🛡️</h1>

  <div class="dashboard">

    <div class="card">
      <div class="icon">🌡️</div>
      <div class="label">درجة الحرارة</div>
      <div class="value" id="temp">--</div>
      <div class="unit">°C</div>
    </div>

    <div class="card">
      <div class="icon">💧</div>
      <div class="label">الرطوبة</div>
      <div class="value" id="humid">--</div>
      <div class="unit">%</div>
    </div>

    <div class="card">
      <div class="icon">🌧️</div>
      <div class="label">حساس المطر</div>
      <div class="value" id="water">--</div>
      <div class="unit">/ 65535</div>
    </div>

    <div class="card">
      <div class="icon">🌱</div>
      <div class="label">رطوبة التربة</div>
      <div class="value" id="soil">--</div>
      <div class="unit">/ 65535</div>
    </div>

  </div>

</body>
</html>
