<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المخططات الانسيابية — الجلسة ١</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:#080c14;font-family:'Cairo',sans-serif;color:#e8f0fe;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,192,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,192,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
  .wrap{position:relative;z-index:1;width:100%;max-width:820px;}
  h1{color:#00e5c0;font-size:26px;font-weight:900;margin-bottom:4px;text-align:center;}
  .sub{color:#6b7fa3;font-size:12px;margin-bottom:36px;text-align:center;letter-spacing:2px;font-family:monospace;}
  .row{display:flex;gap:40px;justify-content:center;align-items:flex-start;flex-wrap:wrap;}
  .col{text-align:center;}
  .ct{font-size:16px;font-weight:700;color:#e8f0fe;margin-bottom:14px;}
  .legend{display:flex;gap:24px;justify-content:center;margin-top:28px;flex-wrap:wrap;}
  .li{display:flex;align-items:center;gap:8px;font-size:12px;color:#6b7fa3;}
  .lo{width:34px;height:16px;background:#00e5c0;border-radius:8px;}
  .lr{width:34px;height:16px;background:#141d2e;border:1.5px solid #5b7fff;border-radius:3px;}
  .ld{width:14px;height:14px;background:#141d2e;border:1.5px solid #ffb347;transform:rotate(45deg);flex-shrink:0;}
</style>
</head>
<body>
<div class="wrap">
  <h1>المخططات الانسيابية 📊</h1>
  <div class="sub">Flowcharts · الجلسة الأولى</div>

  <div class="row">

    <!-- FC1: Morning Algorithm -->
    <div class="col">
      <div class="ct">١. خوارزمية الصباح ☀️</div>
      <svg width="310" height="440" viewBox="0 0 310 440" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="a1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#6b7fa3"/></marker>
          <marker id="a1r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ff6b6b"/></marker>
          <marker id="a1g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#00e5c0"/></marker>
        </defs>

        <!-- START -->
        <ellipse cx="145" cy="36" rx="105" ry="28" fill="#00e5c0"/>
        <text x="145" y="32" text-anchor="middle" font-family="Cairo" font-size="13" font-weight="700" fill="#080c14">الاستيقاظ ⏰</text>
        <text x="145" y="48" text-anchor="middle" font-family="Cairo" font-size="9" fill="#05534a">Wake up</text>

        <line x1="145" y1="64" x2="145" y2="94" stroke="#6b7fa3" stroke-width="1.5" marker-end="url(#a1)"/>

        <!-- DECISION 1: يوم دراسي؟ -->
        <polygon points="145,96 218,126 145,156 72,126" fill="#141d2e" stroke="#ffb347" stroke-width="1.5"/>
        <text x="145" y="122" text-anchor="middle" font-family="Cairo" font-size="12" fill="#e8f0fe">يوم دراسي؟</text>
        <text x="145" y="136" text-anchor="middle" font-family="Cairo" font-size="9" fill="#6b7fa3">School day?</text>

        <!-- NO → right -->
        <line x1="218" y1="126" x2="255" y2="126" stroke="#ff6b6b" stroke-width="1.5" marker-end="url(#a1r)"/>
        <text x="235" y="119" text-anchor="middle" font-family="Cairo" font-size="11" fill="#ff6b6b">لا</text>
        <ellipse cx="283" cy="126" rx="42" ry="24" fill="#200a0e" stroke="#ff6b6b" stroke-width="1.5"/>
        <text x="283" y="121" text-anchor="middle" font-family="Cairo" font-size="11" fill="#ff6b6b">نَم أكثر</text>
        <text x="283" y="136" text-anchor="middle" font-family="Cairo" font-size="14">😴</text>

        <!-- YES ↓ -->
        <line x1="145" y1="156" x2="145" y2="191" stroke="#00e5c0" stroke-width="1.5" marker-end="url(#a1g)"/>
        <text x="131" y="178" font-family="Cairo" font-size="11" fill="#00e5c0">نعم</text>

        <!-- DECISION 2: متأخر؟ -->
        <polygon points="145,193 218,223 145,253 72,223" fill="#141d2e" stroke="#ffb347" stroke-width="1.5"/>
        <text x="145" y="219" text-anchor="middle" font-family="Cairo" font-size="12" fill="#e8f0fe">متأخر؟</text>
        <text x="145" y="233" text-anchor="middle" font-family="Cairo" font-size="9" fill="#6b7fa3">Running late?</text>

        <!-- YES → right -->
        <line x1="218" y1="223" x2="255" y2="223" stroke="#ff6b6b" stroke-width="1.5" marker-end="url(#a1r)"/>
        <text x="235" y="216" text-anchor="middle" font-family="Cairo" font-size="11" fill="#ff6b6b">نعم</text>
        <ellipse cx="283" cy="223" rx="42" ry="24" fill="#200a0e" stroke="#ff6b6b" stroke-width="1.5"/>
        <text x="283" y="218" text-anchor="middle" font-family="Cairo" font-size="11" fill="#ff6b6b">اركض! 🏃</text>
        <text x="283" y="232" text-anchor="middle" font-family="Cairo" font-size="9" fill="#6b7fa3">no breakfast</text>

        <!-- NO ↓ -->
        <line x1="145" y1="253" x2="145" y2="287" stroke="#00e5c0" stroke-width="1.5" marker-end="url(#a1g)"/>
        <text x="131" y="274" font-family="Cairo" font-size="11" fill="#00e5c0">لا</text>

        <!-- PROCESS: كُل الفطور -->
        <rect x="75" y="289" width="140" height="44" rx="8" fill="#141d2e" stroke="#5b7fff" stroke-width="1.5"/>
        <text x="145" y="307" text-anchor="middle" font-family="Cairo" font-size="12" fill="#e8f0fe">كُل الفطور 🍳</text>
        <text x="145" y="323" text-anchor="middle" font-family="Cairo" font-size="9" fill="#6b7fa3">Eat breakfast</text>

        <line x1="145" y1="333" x2="145" y2="367" stroke="#6b7fa3" stroke-width="1.5" marker-end="url(#a1)"/>

        <!-- END -->
        <ellipse cx="145" cy="396" rx="105" ry="30" fill="#00e5c0"/>
        <text x="145" y="391" text-anchor="middle" font-family="Cairo" font-size="13" font-weight="700" fill="#080c14">المدرسة ✓ 🏫</text>
        <text x="145" y="407" text-anchor="middle" font-family="Cairo" font-size="9" fill="#05534a">Go to school</text>
      </svg>
    </div>

    <!-- FC2: How Rasd Works -->
    <div class="col">
      <div class="ct">٢. كيف يعمل رصد (Rasd)؟ 🛡</div>
      <svg width="310" height="510" viewBox="0 0 310 510" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#6b7fa3"/></marker>
          <marker id="a2r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ff6b6b"/></marker>
          <marker id="a2g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#00e5c0"/></marker>
        </defs>

        <!-- START -->
        <ellipse cx="145" cy="36" rx="112" ry="28" fill="#00e5c0"/>
        <text x="145" y="31" text-anchor="middle" font-family="Cairo" font-size="12" font-weight="700" fill="#080c14">الحساس يقرأ البيانات 🌡</text>
        <text x="145" y="47" text-anchor="middle" font-family="Cairo" font-size="9" fill="#05534a">Sensor reads data</text>

        <line x1="145" y1="64" x2="145" y2="94" stroke="#6b7fa3" stroke-width="1.5" marker-end="url(#a2)"/>

        <!-- PROCESS 1 -->
        <rect x="58" y="96" width="174" height="44" rx="8" fill="#141d2e" stroke="#5b7fff" stroke-width="1.5"/>
        <text x="145" y="114" text-anchor="middle" font-family="Cairo" font-size="12" fill="#e8f0fe">إرسال عبر WiFi 📡</text>
        <text x="145" y="130" text-anchor="middle" font-family="Cairo" font-size="9" fill="#6b7fa3">Send via WiFi (Pico W)</text>

        <line x1="145" y1="140" x2="145" y2="170" stroke="#6b7fa3" stroke-width="1.5" marker-end="url(#a2)"/>

        <!-- PROCESS 2 -->
        <rect x="46" y="172" width="198" height="44" rx="8" fill="#141d2e" stroke="#5b7fff" stroke-width="1.5"/>
        <text x="145" y="190" text-anchor="middle" font-family="Cairo" font-size="12" fill="#e8f0fe">الخادم يستقبل البيانات</text>
        <text x="145" y="206" text-anchor="middle" font-family="Cairo" font-size="9" fill="#6b7fa3">Flask server receives data</text>

        <line x1="145" y1="216" x2="145" y2="252" stroke="#6b7fa3" stroke-width="1.5" marker-end="url(#a2)"/>

        <!-- DECISION -->
        <polygon points="145,255 218,285 145,315 72,285" fill="#141d2e" stroke="#ffb347" stroke-width="1.5"/>
        <text x="145" y="280" text-anchor="middle" font-family="Cairo" font-size="11" fill="#e8f0fe">البيانات طبيعية؟</text>
        <text x="145" y="295" text-anchor="middle" font-family="Cairo" font-size="9" fill="#6b7fa3">Normal reading?</text>

        <!-- YES → right -->
        <line x1="218" y1="285" x2="255" y2="285" stroke="#00e5c0" stroke-width="1.5" marker-end="url(#a2g)"/>
        <text x="235" y="278" text-anchor="middle" font-family="Cairo" font-size="11" fill="#00e5c0">نعم</text>
        <ellipse cx="283" cy="285" rx="42" ry="27" fill="#081a10" stroke="#00e5c0" stroke-width="1.5"/>
        <text x="283" y="279" text-anchor="middle" font-family="Cairo" font-size="11" fill="#00e5c0">كل شيء</text>
        <text x="283" y="293" text-anchor="middle" font-family="Cairo" font-size="11" fill="#00e5c0">بخير ✓ 😊</text>

        <!-- NO ↓ -->
        <line x1="145" y1="315" x2="145" y2="352" stroke="#ff6b6b" stroke-width="1.5" marker-end="url(#a2r)"/>
        <text x="131" y="338" font-family="Cairo" font-size="11" fill="#ff6b6b">لا</text>

        <!-- PROCESS 3 -->
        <rect x="70" y="354" width="150" height="44" rx="8" fill="#141d2e" stroke="#ff6b6b" stroke-width="1.5"/>
        <text x="145" y="372" text-anchor="middle" font-family="Cairo" font-size="12" fill="#ff6b6b">إرسال تنبيه 🔔</text>
        <text x="145" y="388" text-anchor="middle" font-family="Cairo" font-size="9" fill="#6b7fa3">Trigger alert</text>

        <line x1="145" y1="398" x2="145" y2="432" stroke="#6b7fa3" stroke-width="1.5" marker-end="url(#a2)"/>

        <!-- END -->
        <ellipse cx="145" cy="462" rx="112" ry="30" fill="#ff6b6b"/>
        <text x="145" y="457" text-anchor="middle" font-family="Cairo" font-size="12" font-weight="700" fill="white">تنبيه على الشاشة! ⚠️</text>
        <text x="145" y="472" text-anchor="middle" font-family="Cairo" font-size="9" fill="white">Alert on dashboard</text>
      </svg>
    </div>

  </div>

  <div class="legend">
    <div class="li"><div class="lo"></div><span>بداية / نهاية</span></div>
    <div class="li"><div class="lr"></div><span>عملية (Process)</span></div>
    <div class="li"><div class="ld"></div><span>قرار (Decision)</span></div>
  </div>
</div>
</body>
</html>
