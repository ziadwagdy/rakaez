<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>رصد — لوحة كاملة (CSS)</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117; --card: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e;
      --accent: #00e5c0; --blue: #58a6ff; --amber: #f0b429; --green: #3fb950; --red: #ff6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; padding: 32px; }
    h1 { text-align: center; color: var(--accent); font-size: 28px; margin-bottom: 8px; }
    .subtitle { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 16px;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }
    .card:hover { transform: translateY(-4px); }
    .card .icon  { font-size: 28px; margin-bottom: 8px; }
    .card .label { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .card .value { font-size: 44px; font-weight: 900; }
    .card .unit  { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .card-temp  { border-top: 3px solid var(--red);    } .card-temp  .value { color: var(--red);    }
    .card-humid { border-top: 3px solid var(--blue);   } .card-humid .value { color: var(--blue);   }
    .card-water { border-top: 3px solid var(--green);  } .card-water .value { color: var(--green);  }
    .card-soil  { border-top: 3px solid var(--amber);  } .card-soil  .value { color: var(--amber);  }
    /* JS سيحدث هذه القيم — الآن هي ثابتة */
  </style>
</head>
<body>
  <h1>🛡️ لوحة تحكم رصد</h1>
  <p class="subtitle">البيانات ثابتة الآن — JavaScript تجيء في الجلسة القادمة</p>
  <div class="dashboard">
    <div class="card card-temp">
      <div class="icon">🌡️</div>
      <div class="label">درجة الحرارة</div>
      <div class="value" id="temp">28.5</div>
      <div class="unit">°C</div>
    </div>
    <div class="card card-humid">
      <div class="icon">💧</div>
      <div class="label">الرطوبة</div>
      <div class="value" id="humid">65</div>
      <div class="unit">%</div>
    </div>
    <div class="card card-water">
      <div class="icon">🌧️</div>
      <div class="label">حساس المطر</div>
      <div class="value" id="water">62000</div>
      <div class="unit">/ 65535</div>
    </div>
    <div class="card card-soil">
      <div class="icon">🌱</div>
      <div class="label">رطوبة التربة</div>
      <div class="value" id="soil">18000</div>
      <div class="unit">/ 65535</div>
    </div>
  </div>
</body>
</html>
