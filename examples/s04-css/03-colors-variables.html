<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>CSS — الألوان والمتغيرات</title>
  <style>
    /* تعريف الألوان مرة واحدة هنا */
    :root {
      --bg:     #0d1117;
      --card:   #161b22;
      --border: #30363d;
      --text:   #e6edf3;
      --muted:  #8b949e;

      --accent: #00e5c0;   /* أخضر-فيروزي */
      --blue:   #58a6ff;
      --amber:  #f0b429;
      --red:    #ff6b6b;
      --green:  #3fb950;
    }

    body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 30px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin: 10px 0;
      width: 200px;
      text-align: center;
    }

    /* لتغيير لون رصد كله — غيّر --accent فقط هنا */
    .value-temp  { color: var(--accent); font-size: 36px; font-weight: 900; }
    .value-humid { color: var(--blue);   font-size: 36px; font-weight: 900; }
    .value-water { color: var(--green);  font-size: 36px; font-weight: 900; }
    .value-soil  { color: var(--amber);  font-size: 36px; font-weight: 900; }
  </style>
</head>
<body>

  <div class="card">
    <p style="color:var(--muted);">🌡️ الحرارة</p>
    <div class="value-temp">28.5</div>
  </div>

  <div class="card">
    <p style="color:var(--muted);">💧 الرطوبة</p>
    <div class="value-humid">65</div>
  </div>

</body>
</html>
