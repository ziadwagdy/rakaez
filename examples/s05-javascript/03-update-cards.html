<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>JS — تحديث البطاقات</title>
  <style>
    body { background: #0d1117; color: #e6edf3; font-family: sans-serif; padding: 24px; }
    .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; max-width: 900px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; text-align: center; }
    .value { font-size: 44px; font-weight: 900; color: #00e5c0; }
    .label { color: #8b949e; font-size: 13px; margin-bottom: 8px; }
  </style>
</head>
<body>

  <div class="dashboard">
    <div class="card"><div class="label">🌡️ الحرارة</div><div class="value" id="temp">--</div></div>
    <div class="card"><div class="label">💧 الرطوبة</div><div class="value" id="humid">--</div></div>
    <div class="card"><div class="label">🌧️ المطر</div><div class="value" id="water">--</div></div>
    <div class="card"><div class="label">🌱 التربة</div><div class="value" id="soil">--</div></div>
  </div>

  <script>
    function update() {
      fetch('http://localhost:8080/api/latest')
        .then(r => r.json())
        .then(data => {
          document.getElementById('temp').textContent  = data.temperature;
          document.getElementById('humid').textContent = data.humidity;
          document.getElementById('water').textContent = data.water_level;
          document.getElementById('soil').textContent  = data.soil_moisture;
        });
    }

    update();                      // شغّل الآن
    setInterval(update, 3000);     // كرّر كل 3 ثوانٍ
  </script>

</body>
</html>
