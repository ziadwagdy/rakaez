<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>JS — تغيير المحتوى</title>
  <style>
    body { background: #0d1117; color: #e6edf3; font-family: sans-serif; padding: 40px; }
    #temp { font-size: 48px; color: #00e5c0; }
    button { margin-top: 20px; padding: 10px 20px; cursor: pointer; }
  </style>
</head>
<body>

  <p>درجة الحرارة:</p>
  <div id="temp">--</div>

  <button onclick="updateTemp()">تحديث</button>

  <script>
    function updateTemp() {
      // getElementById يجد العنصر بالـ id
      // textContent يغير النص داخله
      document.getElementById('temp').textContent = '28.5';
    }
  </script>

</body>
</html>
